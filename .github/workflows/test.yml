name: Test

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

jobs:
    test:
        timeout-minutes: 10
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest]
                node-version: [20, 22, 24]
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm
            - run: npm ci
            - run: npm run check
            - run: npm run test:unit
            - run: npm run build

    lint-and-package:
        timeout-minutes: 10
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm
            - run: npm ci
            - run: npm run test:package
            - run: npm run format:check
